version: '3.8'

services:
  comfyui:
    image: ghcr.io/renatomayoral/nfsw-ai-studio:latest
    container_name: ai-studio-comfyui
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GCS_BUCKET=${GCS_BUCKET:-mktia-ai-studio-outputs}
      - HF_TOKEN=${HF_TOKEN:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/gcp_creds
    ports:
      - "8188:8188"
    volumes:
      - /data:/data
      - ~/.config/gcloud:/root/.config/gcloud:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Local dev dashboard (optional)
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - COMFYUI_URL=http://comfyui:8188
      - GCS_BUCKET=${GCS_BUCKET:-mktia-ai-studio-outputs}
      - GCP_PROJECT=${GCP_PROJECT:-mktia-ai-studio}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-gcp}
    depends_on:
      - comfyui
