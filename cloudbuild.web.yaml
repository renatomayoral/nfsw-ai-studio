steps:
  # ─── Build Next.js Docker image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - build
      - '--file=apps/web/Dockerfile'
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:$SHORT_SHA'
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:latest'
      - '--cache-from=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '.'

  # ─── Push to Artifact Registry ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: [build]
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web'

  # ─── Deploy to Cloud Run ──────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ai-studio-web
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--service-account=cloudrun-web@$PROJECT_ID.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:aistudio'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=60s'
      - '--allow-unauthenticated'
      - >-
        --set-env-vars=NODE_ENV=production,GCP_PROJECT=$PROJECT_ID,GCP_ZONE=us-central1-f,GCP_INSTANCE_NAME=ai-studio-vm,GCS_BUCKET=mktia-ai-studio-outputs,CLOUD_PROVIDER=gcp
      - >-
        --set-secrets=BETTER_AUTH_SECRET=better-auth-secret:latest,BETTER_AUTH_URL=better-auth-url:latest,NEXT_PUBLIC_APP_URL=better-auth-url:latest,GOOGLE_CLIENT_ID=google-client-id:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest,DATABASE_URL=database-url:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest

substitutions:
  _REGION: us-central1

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: 1200s

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/web:latest'
