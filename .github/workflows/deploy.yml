name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: mktia-ai-studio
  REGION: us-central1
  SERVICE: creatorslink
  IMAGE: us-central1-docker.pkg.dev/mktia-ai-studio/creators-link/web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: cloudrun-web@mktia-ai-studio.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      # Build on the runner and push straight to Artifact Registry. This avoids
      # `gcloud builds submit`, which (with a custom WIF service account) fails
      # the serviceusage.services.use check on the _cloudbuild staging bucket.
      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:${{ github.sha }} \
            --project $PROJECT_ID \
            --region $REGION \
            --platform managed \
            --service-account cloudrun-web@mktia-ai-studio.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 10 \
            --memory 1Gi \
            --cpu 1 \
            --port 3000 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "NEXT_PUBLIC_APP_DOMAIN=creatorslink.org" \
            --set-env-vars "NEXT_PUBLIC_APP_URL=https://creatorslink.org" \
            --set-env-vars "BETTER_AUTH_URL=https://creatorslink.org" \
            --set-env-vars "GCP_PROJECT=mktia-ai-studio" \
            --set-env-vars "GCP_ZONE=us-central1-f" \
            --set-env-vars "GCS_BUCKET=mktia-ai-studio-outputs" \
            --set-env-vars "CLOUD_PROVIDER=gcp" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --set-secrets "BETTER_AUTH_SECRET=BETTER_AUTH_SECRET:latest" \
            --set-secrets "GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest" \
            --set-secrets "GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest" \
            --set-secrets "STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --set-secrets "STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --set-secrets "STRIPE_PRICE_SPARK=STRIPE_PRICE_SPARK:latest" \
            --set-secrets "STRIPE_PRICE_CREATOR=STRIPE_PRICE_CREATOR:latest" \
            --set-secrets "STRIPE_PRICE_PRO=STRIPE_PRICE_PRO:latest" \
            --set-secrets "CRON_SECRET=CRON_SECRET:latest" \
            --set-secrets "PATREON_CLIENT_ID=PATREON_CLIENT_ID:latest" \
            --set-secrets "PATREON_CLIENT_SECRET=PATREON_CLIENT_SECRET:latest" \
            --set-secrets "FANVUE_CLIENT_ID=FANVUE_CLIENT_ID:latest" \
            --set-secrets "FANVUE_CLIENT_SECRET=FANVUE_CLIENT_SECRET:latest"
            # NOWPayments (crypto rail) — add when enabling the second rail:
            # --set-secrets "NOWPAYMENTS_API_KEY=NOWPAYMENTS_API_KEY:latest"
            # --set-secrets "NOWPAYMENTS_IPN_SECRET=NOWPAYMENTS_IPN_SECRET:latest"
