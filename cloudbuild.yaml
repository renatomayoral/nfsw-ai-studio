steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:$SHORT_SHA'
      - '--tag=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:latest'
      - '--cache-from=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:latest'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - './docker'
    env:
      - 'DOCKER_BUILDKIT=1'

  # 2. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    waitFor: [build]
    args:
      - push
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    waitFor: [build]
    args:
      - push
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:latest'

  # 3. Check VM status (separate step — no bash vars)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: check-vm
    waitFor: [push-latest]
    args:
      - compute
      - instances
      - describe
      - '${_INSTANCE_NAME}'
      - '--zone=${_ZONE}'
      - '--project=$PROJECT_ID'
      - '--format=value(status)'
    entrypoint: gcloud

  # 4. Deploy script — conditionally deploys to VM if RUNNING
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-if-running
    waitFor: [check-vm]
    entrypoint: bash
    env:
      - 'IMAGE=us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:$SHORT_SHA'
      - 'INSTANCE=${_INSTANCE_NAME}'
      - 'ZONE=${_ZONE}'
      - 'GCS_BUCKET=${_GCS_BUCKET}'
      - 'CB_PROJECT=$PROJECT_ID'
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        VM_STATUS=$$(gcloud compute instances describe "$$INSTANCE" \
          --zone="$$ZONE" \
          --project="$$CB_PROJECT" \
          --format='value(status)' 2>/dev/null || echo "NOT_FOUND")

        echo "VM status: $$VM_STATUS"

        if [ "$$VM_STATUS" != "RUNNING" ]; then
          echo "VM is $$VM_STATUS — skipping live deploy. Image will be used on next boot."
          exit 0
        fi

        echo "VM is RUNNING — deploying $$IMAGE"

        # Build the remote command as a single string (avoids heredoc/stdin issues with IAP)
        # renato is in docker group (no sudo needed); uses VM metadata ADC for gcloud auth
        REMOTE_CMD="set -e
        gcloud auth configure-docker us-central1-docker.pkg.dev -q
        docker pull '$$IMAGE'
        docker stop ai-studio-comfyui 2>/dev/null || true
        docker rm   ai-studio-comfyui 2>/dev/null || true
        docker run -d \
          --name ai-studio-comfyui \
          --runtime=nvidia --gpus all \
          -p 8188:8188 \
          -v /data:/data \
          -e GCS_BUCKET='$$GCS_BUCKET' \
          -e CLOUD_PROVIDER=gcp \
          --restart unless-stopped \
          '$$IMAGE'
        echo 'Container updated to $$IMAGE'"

        gcloud compute ssh "renato@$$INSTANCE" \
          --zone="$$ZONE" \
          --project="$$CB_PROJECT" \
          --tunnel-through-iap \
          --strict-host-key-checking=no \
          --command="$$REMOTE_CMD"

substitutions:
  _INSTANCE_NAME: ai-studio-vm
  _ZONE: us-central1-f
  _GCS_BUCKET: mktia-ai-studio-outputs

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamic_substitutions: true

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/ai-studio/comfyui:latest'

timeout: 3600s
